name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-ci.lock
          pip install -e .
          python -m pip check
      - name: Lint (ruff)
        run: |
          . .venv/bin/activate
          ruff check .
      - name: Determinism gate (two fresh runs, byte-identical)
        run: |
          . .venv/bin/activate
          python -m tests.determinism.gate
      - name: Test (pytest)
        run: |
          . .venv/bin/activate
          pytest tests/ --junitxml=report.xml
